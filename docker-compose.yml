version: '3.8'

services:
  # 1. The Core Business Database (Upgraded to Replica Set)
  mongodb:
    image: mongo:7.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. The High-Speed Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 3. The Isolated Auth Vault 
  supertokens_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth_admin
      POSTGRES_PASSWORD: supertokens_secure_vault
      POSTGRES_DB: supertokens
    volumes:
      - auth_vault_data:/var/lib/postgresql/data

  # 4. The Auth Microservice Core
  supertokens:
    image: supertokens/supertokens-postgresql:latest
    depends_on:
      - supertokens_db
    ports:
      - "3567:3567"
    environment:
      POSTGRESQL_USER: auth_admin
      POSTGRESQL_PASSWORD: supertokens_secure_vault
      POSTGRESQL_HOST: supertokens_db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE_NAME: supertokens

  # ---------------------------------------------------------
  # THE OBSERVABILITY STACK (PLG)
  # ---------------------------------------------------------
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # 6. The Log Shipper — reads ./logs from host, ships to Loki
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/nextgenhrms:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3005:3000" # Mapped to 3005 to avoid Next.js port collisions
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - loki
      - promtail

volumes:
  mongo_data:
  auth_vault_data:
  loki_data: