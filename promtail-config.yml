server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nextgen-hrms
    static_configs:
      - targets:
          - localhost
        labels:
          app: nextgen-hrms
          env: development
          __path__: /var/log/nextgenhrms/*.log

    pipeline_stages:
      # Step 1: Extract raw numeric level and other fields from Pino's JSON
      - json:
          expressions:
            level: level
            event: event
            statusCode: statusCode

      # Step 2: Convert Pino's numeric level to a string in the extracted map
      # Pino levels: 10=trace, 20=debug, 30=info, 40=warn, 50=error, 60=fatal
      # template stage modifies the EXTRACTED VALUE — this works reliably unlike replace
      # This makes Grafana auto-detect the level and apply color coding
      - template:
          source: level
          template: '{{ if eq .Value "10" }}trace{{ else if eq .Value "20" }}debug{{ else if eq .Value "30" }}info{{ else if eq .Value "40" }}warn{{ else if eq .Value "50" }}error{{ else if eq .Value "60" }}fatal{{ else }}{{ .Value }}{{ end }}'

      # Step 3: Promote string level to a Grafana-searchable Loki label
      # level="info" / level="warn" / level="error" — Grafana reads this for color coding
      - labels:
          level:
          event:
          statusCode:
